<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}MiniCMS{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  </head>
  <body>
    <header>
      <h1><a href="{{ url_for('public_index') }}">MiniCMS</a></h1>
      <nav>
        <a href="{{ url_for('public_index') }}">Public site</a>
        <a href="{{ url_for('admin_index') }}">Admin</a>
      </nav>
    </header>

    <main>
      {% with messages = get_flashed_messages() %}
      {% if messages %}
      <ul class="flash-list">
        {% for message in messages %}
        <li>{{ message }}</li>
        {% endfor %}
      </ul>
      {% endif %}
      {% endwith %}

      {% block content %}{% endblock %}
    </main>
  </body>
</html>
