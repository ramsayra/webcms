{% extends "base.html" %}
{% block title %}Themes | MiniCMS{% endblock %}
{% block content %}
<section>
  <div class="toolbar"><h2>Themes</h2><a class="button secondary" href="{{ url_for('admin_entry') }}">Back</a></div>

  <form method="post" class="form-grid card">
    <input type="hidden" name="action" value="create" />
    <label>Name <input name="name" required /></label>
    <label>Theme CSS <textarea name="custom_css" rows="5"></textarea></label>
    <label>Header HTML area <textarea name="header_html" rows="4"></textarea></label>
    <label>Footer HTML area <textarea name="footer_html" rows="4"></textarea></label>
    <button class="button" type="submit">Create Theme</button>
  </form>

  <table>
    <thead><tr><th>Name</th><th>Active</th><th>Action</th></tr></thead>
    <tbody>
      {% for t in themes %}
      <tr>
        <td>{{ t['name'] }}</td>
        <td>{{ 'Yes' if t['is_active'] else 'No' }}</td>
        <td>
          {% if not t['is_active'] %}
          <form method="post"><input type="hidden" name="action" value="activate" /><input type="hidden" name="theme_id" value="{{ t['id'] }}" /><button class="button" type="submit">Activate</button></form>
          {% else %}Current{% endif %}
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</section>
{% endblock %}
